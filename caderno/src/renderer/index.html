<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Caderno</title>

  <!-- Monaco loader -->
  <script src="./monaco/vs/loader.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #tabs {
      height: 32px;
      background: #2b2b2b;
      color: #fff;
      display: flex;
      align-items: center;
      overflow-x: auto;
      white-space: nowrap;
    }

    .tab {
      padding: 6px 16px;
      position: relative;
      cursor: pointer;
    }

    .tab.active {
      background: #1e1e1e;
    }

    .tab .close {
      position: absolute;
      right: 6px;
      top: 5px;
      cursor: pointer;
      opacity: 0.7;
    }

    .tab .close:hover {
      opacity: 1;
    }

    #editor-container {
      flex: 1;
      position: relative;
    }

    #editor,
    #diff-editor {
      position: absolute;
      inset: 0;
    }

    #diff-editor {
      display: none;
    }

    #status-bar {
      height: 22px;
      background: #007acc;
      color: white;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="tabs"></div>

    <div id="editor-container">
      <div id="editor"></div>
      <div id="diff-editor"></div>
    </div>

    <div id="status-bar">
      <span id="cursor-pos">Ln 1, Col 1</span>
      <span id="language">plaintext</span>
      <span id="selection">Sel: 0</span>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
