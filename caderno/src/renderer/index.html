<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Caderno</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1e1e1e;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #tabs {
      height: 32px;
      background: #252526;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #333;
      padding-left: 6px;
    }

    .tab {
      padding: 6px 12px;
      color: #ccc;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .tab.active {
      background: #1e1e1e;
      color: white;
    }

    .tab .close {
      position: absolute;
      right: 6px;
      top: 6px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
    }

    #editor {
      flex: 1;
    }

    /* ✅ STATUS BAR */
    #status-bar {
      height: 24px;
      background: #007acc;
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 10px;
      font-size: 12px;
    }
  </style>

  <script src="./monaco/vs/loader.js"></script>
</head>

<body>
  <div id="app">
    <div id="tabs"></div>
    <div id="editor"></div>

    <!-- ✅ STATUS BAR -->
    <div id="status-bar">
      <span id="cursor-pos">Ln 1, Col 1</span>
      <span id="language">Plain text</span>
      <span id="selection">Sel: 0</span>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
