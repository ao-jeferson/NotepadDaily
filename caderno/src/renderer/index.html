<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Caderno</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="app">
      <!-- ✅ Top Toolbar -->
      <div id="toolbar">
        <!-- Navegação -->
        <div class="toolbar-group">
          <button id="nav-back" title="Voltar (Alt + ←)">←</button>
          <button id="nav-forward" title="Avançar (Alt + →)">→</button>
          <button id="nav-split" title="Split View (Ctrl + \)">⧉</button>
        </div>

        <div class="toolbar-separator"></div>

        <!-- Workspace -->
        <div class="toolbar-group">
          <span class="toolbar-label">Workspace</span>
          <button id="btn-open-workspace" title="Open Folder">📂</button>
          <button id="btn-refresh-workspace" title="Refresh">⟳</button>
        </div>
      </div>

      <!-- ✅ Main Area -->
      <div id="main">
        <!-- Sidebar -->
        <div id="sidebar">
          <div id="workspace-header">Workspace</div>
          <div id="workspace-tree"></div>
        </div>

        <!-- ✅ DIVISOR -->
        <div id="sidebar-resizer"></div>

        <!-- Editor Area -->
        <div id="content">
          <div id="tabs"></div>

          <div id="editor-container">
            <div id="editor-left"></div>
            <div id="editor-right" class="hidden"></div>
            <div id="diff-editor"></div>
          </div>
        </div>
      </div>

      <!-- Status Bar -->
      <div id="status-bar">
        | <span id="cursor-pos">Ln 1, Col 1</span> |
        <span id="language">plaintext</span> |
        <span id="selection">Sel: 0</span>
      </div>
    </div>

    <!-- Scripts -->
    <script src="./monaco/vs/loader.js"></script>
    <script src="./renderer.js"></script>
    <script src="./features/zoom.feature.js"></script>
    <script src="./workspace/workspace.feature.js"></script>
  </body>
</html>
