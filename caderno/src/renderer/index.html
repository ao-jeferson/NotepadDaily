<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Caderno</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1e1e1e;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #tabs {
      height: 32px;
      background: #252526;
      display: flex;
      align-items: center;
      padding-left: 8px;
      border-bottom: 1px solid #333;
    }

    .tab {
      padding: 6px 12px;
      margin-right: 4px;
      color: #ccc;
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      background: #1e1e1e;
      color: #fff;
    }

    #editor {
      flex: 1;
    }
  </style>

  <!-- ✅ CARREGAMENTO CORRETO DO MONACO -->
  <script src="./monaco/vs/loader.js"></script>
</head>

<body>
  <div id="app">
    <div id="tabs"></div>
    <div id="editor"></div>
  </div>

  <!-- ✅ CARREGAMENTO CORRETO DO RENDERER -->
  <script src="./renderer.js"></script>
</body>
</html>
