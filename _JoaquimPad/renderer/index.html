<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>_JoaquimPad</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- Barra de abas -->
  <div class="menu-bar">
    <button id="newTabBtn" title="Nova Aba">+</button>
  </div>
  <div class="tab-bar" id="tabs"></div>
  <div class="status-bar" id="statusbar"></div>
  <!-- Editor -->
  <div id="editor"></div>

  <!-- Barra de status -->
  <div class="status-bar" id="statusbar"></div>



  <!-- MONACO LOADER -->
  <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>

  <!-- BOOT (MÓDULO) -->
  <script type="module" src="./boot.js"></script>

  <script>
    require.config({
      paths: {
        vs: "../node_modules/monaco-editor/min/vs"
      }
    });

    require(["vs/editor/editor.main"], function () {
      window.createEditor();
    });
  </script>
</body>

</html>
