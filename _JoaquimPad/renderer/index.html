<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>_JoaquimPad</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Barra superior: navegação + ações -->
    <div class="top-bar">
      <!-- Barra de ações -->
      <div class="action-bar">
        <button id="newTabBtn" title="Nova aba">+</button>

        <button id="cursorBack" disabled title="Voltar no histórico">
          <svg viewBox="0 0 64 24" class="nav-arrow left">
            <line x1="20" y1="12" x2="60" y2="12" />
            <polyline points="20,4 4,12 20,20" />
          </svg>
        </button>

        <button id="cursorForward" disabled title="Avançar no histórico">
          <svg viewBox="0 0 64 24" class="nav-arrow right">
            <line x1="4" y1="12" x2="44" y2="12" />
            <polyline points="44,4 60,12 44,20" />
          </svg>
        </button>
      </div>

      <!-- Barra de abas -->
      <div id="tabs" class="tabs-bar"></div>

      <!-- Ações -->
    </div>

    <!-- Área das abas -->
    <div class="tab-bar" id="tabs"></div>

    <!-- Editor -->
    <div id="editor"></div>

    <!-- Barra de status -->
    <div class="status-bar" id="statusbar"></div>

    <!-- SortableJS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <!-- Monaco Editor -->
    <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
    <script>
      require.config({ paths: { vs: "../node_modules/monaco-editor/min/vs" } });
      require(["vs/editor/editor.main"], function () {
        // Carrega boot.js como módulo ES
        import("./boot.js")
          .then(() => {
            if (window.createEditor) {
              window.createEditor();
            } else {
              console.error("createEditor não encontrado em boot.js");
            }
          })
          .catch((err) => console.error("Erro ao carregar boot.js:", err));
      });
    </script>
  </body>
</html>
