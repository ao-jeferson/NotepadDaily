<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Monaco Editor</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        #container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.20.0/min/vs/loader.min.js"></script>
    <script>
        var pywebchannel = null;
        
        new QWebChannel(qt.webChannelTransport, function(channel) {
            pywebchannel = channel.objects.pywebchannel;
            initEditor();
        });

        function initEditor() {
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.20.0/min/vs' }});

            require(['vs/editor/editor.main'], function() {
                window.editor = monaco.editor.create(document.getElementById('container'), {
                    value: '',
                    language: 'python',
                    theme: 'vs',
                    automaticLayout: true,
                    fontSize: 14,
                    minimap: { enabled: true },
                    scrollBeyondLastLine: false,
                    wordWrap: 'on',
                    formatOnPaste: true,
                    formatOnType: true
                });

                // Track cursor position
                window.editor.onDidChangeCursorPosition((e) => {
                    const position = e.position;
                    const selection = window.editor.getSelection();
                    const selectedText = window.editor.getModel().getValueInRange(selection);
                    
                    if (pywebchannel) {
                        pywebchannel.sendCursorPosition({
                            line: position.lineNumber,
                            column: position.column,
                            selectedChars: selectedText.length,
                            totalChars: window.editor.getValue().length
                        });
                    }
                });

                // Track content changes for file size
                window.editor.onDidChangeModelContent(() => {
                    const totalChars = window.editor.getValue().length;
                    if (pywebchannel) {
                        pywebchannel.sendFileSize({ totalChars: totalChars });
                    }
                });

                // Initialize
                if (pywebchannel) {
                    pywebchannel.sendFileSize({ totalChars: 0 });
                }
            });
        }

        function setContent(content, language) {
            if (window.editor) {
                if (window.editor.getModel) {
                    const model = window.editor.getModel();
                    if (model) {
                        monaco.editor.setModelLanguage(model, language);
                        window.editor.setValue(content);
                    }
                } else {
                    // Editor not ready yet, try again after delay
                    setTimeout(function() {
                        setContent(content, language);
                    }, 100);
                }
            }
        }

        function getContent() {
            if (window.editor) {
                return window.editor.getValue();
            }
            return '';
        }

        function formatDocument() {
            if (window.editor) {
                var action = window.editor.getAction('editor.action.formatDocument');
                if (action) {
                    action.run();
                }
            }
        }

        function setLanguage(language) {
            if (window.editor) {
                const model = window.editor.getModel();
                if (model) {
                    monaco.editor.setModelLanguage(model, language);
                }
            }
        }

        function moveCursorTo(line, column) {
            if (window.editor) {
                window.editor.setPosition({ lineNumber: line, column: column });
                window.editor.revealLineInCenter(line);
            }
        }
    </script>
</body>
</html>
